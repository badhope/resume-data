version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-cleaner-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - DEBUG=true
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: resume-cleaner-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3005:3005"
    command: sh -c "npm install && npm run dev -- --port 3005"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
