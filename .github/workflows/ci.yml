name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Skill Structure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Skill Structure
        run: |
          echo "========================================="
          echo "REFUTE SKILL - UNIVERSAL STANDARD CHECK"
          echo "========================================="
          
          # ======================================
          # CHECK 1: UNIVERSAL STANDARD PATH
          # ======================================
          echo ""
          echo "Checking standard path: skills/refute/"
          
          if [ ! -f "skills/refute/SKILL.md" ]; then
            echo "❌ skills/refute/SKILL.md NOT FOUND"
            echo "   Universal Skill standard requires skills/refute/SKILL.md"
            exit 1
          fi
          echo "✅ skills/refute/SKILL.md (English) found"
          
          if [ ! -f "skills/refute/SKILL_CN.md" ]; then
            echo "❌ skills/refute/SKILL_CN.md NOT FOUND"
            exit 1
          fi
          echo "✅ skills/refute/SKILL_CN.md (Chinese) found"

          # ======================================
          # PLATFORM NEUTRALITY VERIFICATION
          # ======================================
          echo ""
          echo "Verifying platform neutrality..."
          
          if [ -d ".trae" ]; then
            echo "⚠️  WARNING: Found .trae directory - project should be platform neutral"
          else
            echo "✅ 100% Platform Neutral - No vendor lock-in"
          fi

          # ======================================
          # CHECK 3: README INTERNATIONALIZATION
          # ======================================
          echo ""
          echo "Checking documentation..."
          
          if [ ! -f "README.md" ]; then
            echo "❌ README.md (English) not found!"
            exit 1
          fi
          echo "✅ README.md (English DEFAULT) - Standard convention"
          
          if [ ! -f "README_CN.md" ]; then
            echo "❌ README_CN.md (Chinese) not found!"
            exit 1
          fi
          echo "✅ README_CN.md (Chinese) found"

          # ======================================
          # CHECK 4: SKILL METADATA VALIDATION
          # ======================================
          echo ""
          echo "Checking frontmatter metadata..."
          
          head -5 skills/refute/SKILL.md | grep -q "name:" && echo "✅ name field found"
          head -5 skills/refute/SKILL.md | grep -q "description:" && echo "✅ description field found"
          head -5 skills/refute/SKILL.md | grep -q "language: \"en-US\"" && echo "✅ language tag found"
          head -5 skills/refute/SKILL.md | grep -q "version:" && echo "✅ semver tag found"

          echo ""
          echo "========================================="
          echo "✅ ALL VALIDATIONS PASSED"
          echo "   Universal Skill Standard + I18N + Trae Compatibility"
          echo "========================================="

  markdown-lint:
    runs-on: ubuntu-latest
    name: Markdown Lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: '**/*.md'
